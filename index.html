<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Credit Card UI</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- CSS -->
    <link rel="stylesheet" href="assets/css/styles.css">
</head>

<body>

<!-- NAVBAR -->
<nav class="navbar navbar-dark">
  <div class="container justify-content-center">
    <span class="navbar-brand text-center w-100">Credit Card</span>
  </div>
</nav>

<!-- MAIN -->
<div class="container d-flex justify-content-center align-items-center vh-100">

    <div class="card-glass p-4 row w-100">

        <!-- TARJETA -->
        <div class="col-md-6 mb-3">
            <div class="credit-card">

                <div class="d-flex justify-content-between">
                    <span>💳</span>
                    <span id="card-type">VISA</span>
                </div>

                <h5 id="card-number">#### #### #### ####</h5>

                <div class="d-flex justify-content-between">
                    <div>
                        <small>CARD HOLDER</small>
                        <p id="card-name">FULL NAME</p>
                    </div>
                    <div>
                        <small>EXPIRES</small>
                        <p id="card-exp">MM/YY</p>
                    </div>
                </div>

            </div>
        </div>

        <!-- FORMULARIO -->
        <div class="col-md-6">
            <h4 class="mb-3 text-center">Payment Details</h4>

            <input type="text" id="number" class="form-control mb-2" placeholder="Card Number">
            <input type="text" id="name" class="form-control mb-2" placeholder="Card Holder">

            <!-- SELECTS -->
            <div class="d-flex gap-2 mb-2">
                <select id="month" class="form-control">
                    <option value="">Mes</option>
                    <option>01</option><option>02</option><option>03</option>
                    <option>04</option><option>05</option><option>06</option>
                    <option>07</option><option>08</option><option>09</option>
                    <option>10</option><option>11</option><option>12</option>
                </select>

                <select id="year" class="form-control">
                    <option value="">Año</option>
                    <option>24</option><option>25</option><option>26</option>
                    <option>27</option><option>28</option><option>29</option>
                    <option>30</option>
                </select>

                <input type="text" id="cvv" class="form-control" placeholder="CVV">
            </div>

            <button class="btn w-100 mt-3">Pay Now</button>
        </div>

    </div>
</div>

<!-- FOOTER -->
<footer class="text-white text-center p-3">
    Adrian Reyes Lozano - 21200127
</footer>

<script src="assets/js/script.js"></script>
</body>
</html>
