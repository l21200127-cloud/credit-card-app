<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Credit Card UI</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- CSS -->
    <link rel="stylesheet" href="assets/css/styles.css">
</head>

<body>

<!-- NAVBAR -->
<nav class="navbar navbar-dark">
  <div class="container">
    <span class="navbar-brand">Credit Card</span>
  </div>
</nav>

<!-- MAIN -->
<div class="container d-flex justify-content-center align-items-center vh-100">

    <div class="card-glass p-4 row w-100">

        <!-- TARJETA -->
        <div class="col-md-6 mb-3">
            <div class="credit-card">

                <div class="d-flex justify-content-between">
                    <span>💳</span>
                    <span>VISA</span>
                </div>

                <h5 id="card-number">#### #### #### ####</h5>

                <div class="d-flex justify-content-between">
                    <div>
                        <small>CARD HOLDER</small>
                        <p id="card-name">FULL NAME</p>
                    </div>
                    <div>
                        <small>EXPIRES</small>
                        <p id="card-exp">MM/YY</p>
                    </div>
                </div>

            </div>
        </div>

        <!-- FORMULARIO -->
        <div class="col-md-6">
            <h4 class="mb-3">Payment Details</h4>

            <input type="text" id="number" class="form-control mb-2" placeholder="Card Number">
            <input type="text" id="name" class="form-control mb-2" placeholder="Card Holder">

            <div class="d-flex gap-2">
                <input type="text" id="exp" class="form-control" placeholder="MM/YY">
                <input type="text" class="form-control" placeholder="CVV">
            </div>

            <button class="btn w-100 mt-3">Pay Now</button>
        </div>

    </div>
</div>

<!-- FOOTER -->
<footer class="text-white text-center p-3">
    Adrian Reyes Lozano - 21200127
</footer>

<script src="assets/js/script.js"></script>
</body>
</html>
